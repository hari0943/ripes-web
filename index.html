<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripes Web</title>

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        #screen {
            width: 100vw;
            height: 100vh;
        }

        #status {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1e1e2e;
            color: #cdd6f4;
            z-index: 9999;
            gap: 16px;
        }

        #status h2 {
            margin: 0;
            font-size: 1.4em;
            font-weight: 500;
            color: #cba6f7;
        }

        #status .subtitle {
            font-size: 0.85em;
            color: #6c7086;
            max-width: 360px;
            text-align: center;
            line-height: 1.5;
        }

        #status .elapsed {
            font-size: 0.9em;
            color: #a6adc8;
        }

        #status .error {
            color: #f38ba8;
            font-size: 0.9em;
            max-width: 400px;
            text-align: center;
            word-break: break-word;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #313244;
            border-top-color: #cba6f7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

    <!-- MUST be first: service worker that injects COOP/COEP headers for SharedArrayBuffer -->
    <script src="coi-serviceworker.min.js"></script>

    <script src="qtloader.js"></script>
    <script src="Ripes.js"></script>
</head>

<body>
    <div id="screen"></div>

    <div id="status">
        <div class="spinner" id="spinner"></div>
        <h2>Loading Ripes</h2>
        <div class="elapsed" id="elapsed">0s</div>
        <div class="subtitle">
            Compiling a 31MB WebAssembly module — first load takes ~30 seconds.
            Subsequent visits are cached and load in ~5s.
        </div>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const elapsedEl = document.getElementById('elapsed');
        const spinnerEl = document.getElementById('spinner');
        const start = Date.now();

        const timer = setInterval(() => {
            elapsedEl.textContent = Math.round((Date.now() - start) / 1000) + 's';
        }, 1000);

        function showError(msg) {
            clearInterval(timer);
            spinnerEl.style.display = 'none';
            elapsedEl.style.display = 'none';
            const errDiv = document.createElement('div');
            errDiv.className = 'error';
            errDiv.textContent = 'Error: ' + msg;
            statusEl.appendChild(errDiv);
        }

        qtLoad({
            qt: {
                containerElements: [document.getElementById('screen')],
                entryFunction: createQtAppInstance,
                onLoaded: () => {
                    clearInterval(timer);
                    statusEl.style.display = 'none';
                },
                onExit: (exit) => {
                    if (exit.crashed) {
                        showError(exit.text || 'Application crashed');
                    }
                }
            }
        }).catch(e => {
            showError(e.message || String(e));
        });
    </script>
</body>
</html>
