<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Ripes Web</title>

    <style>
        html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
        #screen { width: 100vw; height: 100vh; }
        #status { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
                  font-family: sans-serif; font-size: 1.2em; color: #555; }
    </style>

    <!-- MUST be first: installs a service worker that injects COOP/COEP headers -->
    <script src="coi-serviceworker.min.js"></script>

    <script src="qtloader.js"></script>
    <script src="Ripes.js"></script>
</head>

<body>
    <div id="screen"></div>
    <div id="status">Loading Ripes...</div>

    <script>
        qtLoad({
            qt: {
                containerElements: [document.getElementById("screen")],
                entryFunction: createQtAppInstance,
                onLoaded: () => {
                    document.getElementById("status").style.display = "none";
                },
                onExit: (exit) => {
                    const s = document.getElementById("status");
                    s.style.display = "block";
                    s.textContent = exit.crashed
                        ? "Crashed: " + exit.text
                        : "Exited with code " + exit.code;
                    console.error("Ripes exit:", exit);
                }
            }
        }).catch(e => {
            const s = document.getElementById("status");
            s.style.display = "block";
            s.style.color = "red";
            s.textContent = "Failed to load: " + e.message;
            console.error("qtLoad failed:", e);
        });
    </script>
</body>
</html>
